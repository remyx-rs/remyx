[package]
name = "remyx"
description = "A framework for building TUIs on top of Ratatui"
version = "0.1.0"
edition = "2024"
authors = ["Manuel Garcia de la Vega Hoyo <manuelgdlvh@gmail.com>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/manuelgdlvh/remyx"
categories = ["gui"]
keywords = ["tui", "elm", "ui", "gui", "ratatui", "interface"]
rust-version = "1.92"


[dependencies]
ratatui = { version = "0.30", default-features = false }
crossterm = { version = "0.29", features = ["event-stream"], optional = true }
futures = { version = "0.3.32", optional = true }

[dev-dependencies]
reqwest = "0.13.4"
tokio = { version = "1", features = ["full"] }
lol_html = "2.9.0"

[features]
default = ["crossterm"]
crossterm = [
    "dep:crossterm",
    "dep:futures",
    "ratatui/crossterm",
]

[lib]
name = "remyx"
path = "src/lib.rs"
